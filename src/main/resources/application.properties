spring.application.name=croplab

# Conexión a BBDD — todas las propiedades leen de variables de entorno con valor por
# defecto local. En desarrollo arrancas con tu MariaDB en localhost:1111 sin tocar nada.
# En producción defines DB_URL / DB_USERNAME / DB_PASSWORD en Render.
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:1111/agrisim_db}
spring.datasource.username=${DB_USERNAME:croplab}
spring.datasource.password=${DB_PASSWORD:croplab}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Pool de conexiones — TiDB serverless cierra conexiones inactivas, así que mantenemos
# un pool pequeño con timeouts ajustados.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# CORS — origen permitido (en local apunta al dev server de Vite; en prod sobreescribimos
# con la URL del front en Netlify). Se lee en CorsConfig.java.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4173}

# JWT — usa la misma clave en local; en prod se cambia por variable de entorno
app.jwt.secret=${JWT_SECRET:croplab-dev-secret-please-change-in-production-this-must-be-long-enough}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Puerto — Render asigna el puerto a la env var PORT
server.port=${PORT:8080}
